<body>
<div id="app"></div>

<script>
    const ADMIN_USERNAME = "SStwendRT";
    let currentMessagesListener = null;
    let isLoadingMore = false;
    let hasMoreMessages = true;
    let oldestMessageTimestamp = null;
    let displayedMessagesSet = new Set();
    let replyingTo = null; // { messageId, username, text }
    let currentChannelId = null;
    let currentUser = null;
    let isAdmin = false;
    
    const firebaseConfig = {
        apiKey: "AIzaSyB9XzL1XzL1XzL1XzL1XzL1XzL1XzL1",
        authDomain: "ipsteal-4bf1c.firebaseapp.com",
        databaseURL: "https://ipsteal-4bf1c-default-rtdb.firebaseio.com/",
        projectId: "ipsteal-4bf1c",
        storageBucket: "ipsteal-4bf1c.firebasestorage.app",
        messagingSenderId: "000000000000",
        appId: "1:000000000000:web:xxxxxxxxxxxx"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const usersRef = database.ref('users');
    const messagesRef = database.ref('channel_messages');
    const bansRef = database.ref('bans');
    const mutesRef = database.ref('mutes');
    const channelsRef = database.ref('channels');
    const rolesRef = database.ref('roles');
    const userRolesRef = database.ref('user_roles');
    
    function getDirectGifUrl(url) {
        if (url.includes('tenor.com')) {
            const match = url.match(/\/view\/(?:[^-]+-)*([a-zA-Z0-9]+)/);
            if (match && match[1]) {
                return `https://media.tenor.com/${match[1]}/tenor.gif`;
            }
        }
        return url;
    }
    
    async function uploadFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                resolve(e.target.result);
            };
            reader.readAsDataURL(file);
        });
    }
    
    async function showImageUploadDialog() {
        const { value: choice } = await Swal.fire({
            title: 'Upload Image',
            input: 'select',
            inputOptions: {
                'url': 'Paste URL',
                'file': 'Upload File'
            },
            inputPlaceholder: 'Choose option',
            showCancelButton: true,
            confirmButtonText: 'Next',
            cancelButtonText: 'Cancel'
        });
        
        if (choice === 'url') {
            const { value: url } = await Swal.fire({
                title: 'Image URL',
                input: 'url',
                inputPlaceholder: 'https://example.com/image.jpg',
                showCancelButton: true,
                confirmButtonText: 'Send'
            });
            if (url) {
                sendMessage(url, 'image');
            }
        } else if (choice === 'file') {
            const { value: file } = await Swal.fire({
                title: 'Select Image',
                input: 'file',
                inputAttributes: {
                    'accept': 'image/*',
                    'aria-label': 'Choose image'
                },
                showCancelButton: true,
                confirmButtonText: 'Upload'
            });
            if (file) {
                const imageUrl = await uploadFile(file);
                sendMessage(imageUrl, 'image');
            }
        }
    }
    
    async function showGifUploadDialog() {
        const { value: choice } = await Swal.fire({
            title: 'Upload GIF',
            input: 'select',
            inputOptions: {
                'url': 'Paste GIF URL',
                'file': 'Upload GIF File'
            },
            inputPlaceholder: 'Choose option',
            showCancelButton: true,
            confirmButtonText: 'Next',
            cancelButtonText: 'Cancel'
        });
        
        if (choice === 'url') {
            const { value: url } = await Swal.fire({
                title: 'GIF URL',
                input: 'url',
                inputPlaceholder: 'https://example.com/animation.gif or Tenor link',
                showCancelButton: true,
                confirmButtonText: 'Send'
            });
            if (url) {
                const directUrl = getDirectGifUrl(url);
                sendMessage(directUrl, 'gif');
            }
        } else if (choice === 'file') {
            const { value: file } = await Swal.fire({
                title: 'Select GIF',
                input: 'file',
                inputAttributes: {
                    'accept': 'image/gif',
                    'aria-label': 'Choose GIF'
                },
                showCancelButton: true,
                confirmButtonText: 'Upload'
            });
            if (file) {
                const gifUrl = await uploadFile(file);
                sendMessage(gifUrl, 'gif');
            }
        }
    }
    
    async function checkChannelPermissions(channelId, userId, action = 'send') {
        if (!channelId) return false;
        const channelSnapshot = await channelsRef.child(channelId).once('value');
        const channel = channelSnapshot.val();
        if (!channel) return action === 'send' ? false : true;
        if (channel.owner === userId) return true;
        const userRoleSnapshot = await userRolesRef.child(userId).once('value');
        const userRoleId = userRoleSnapshot.val();
        if (action === 'send') {
            if (!channel.allowedToSend || channel.allowedToSend === 'all') return true;
            if (channel.allowedToSend === 'roles' && userRoleId && channel.allowedRoles?.includes(userRoleId)) return true;
            if (channel.allowedToSend === 'users' && channel.allowedUsers?.includes(userId)) return true;
            return false;
        } else if (action === 'view') {
            if (!channel.allowedToView || channel.allowedToView === 'all') return true;
            if (channel.allowedToView === 'roles' && userRoleId && channel.viewRoles?.includes(userRoleId)) return true;
            if (channel.allowedToView === 'users' && channel.viewUsers?.includes(userId)) return true;
            return false;
        }
        return true;
    }
    
    async function checkSlowmode(channelId, userId) {
        if (!channelId) return true;
        const channelSnapshot = await channelsRef.child(channelId).once('value');
        const channel = channelSnapshot.val();
        if (!channel || !channel.slowmode || channel.slowmode === 0) return true;
        const lastMsgSnapshot = await messagesRef.child(channelId).orderByChild('timestamp').limitToLast(1).once('value');
        let lastTime = 0;
        lastMsgSnapshot.forEach(msg => {
            if (msg.val().userId === userId) {
                lastTime = msg.val().timestamp;
            }
        });
        const timeSince = Date.now() - lastTime;
        if (timeSince < channel.slowmode * 1000) {
            const waitSeconds = Math.ceil((channel.slowmode * 1000 - timeSince) / 1000);
            Swal.fire('Slow Mode', `Please wait ${waitSeconds} seconds before sending another message`, 'warning');
            return false;
        }
        return true;
    }
    
    async function deleteMessage(messageId, messageUserId) {
        const canDelete = isAdmin || messageUserId === currentUser.id;
        if (!canDelete) {
            Swal.fire('Error', 'You can only delete your own messages', 'error');
            return;
        }
        
        const result = await Swal.fire({
            title: 'Delete Message?',
            text: 'This action cannot be undone',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Delete',
            cancelButtonText: 'Cancel'
        });
        
        if (result.isConfirmed) {
            await messagesRef.child(currentChannelId).child(messageId).remove();
            const messageElement = document.querySelector(`.message[data-key="${messageId}"]`);
            if (messageElement) {
                messageElement.remove();
            }
            displayedMessagesSet.delete(messageId);
            Swal.fire('Deleted', 'Message deleted', 'success');
        }
    }

    async function loadMoreMessages() {
        if (!currentChannelId || isLoadingMore || !hasMoreMessages) return;
        isLoadingMore = true;
        const loader = document.getElementById('messagesLoader');
        if (loader) loader.classList.add('active');
        
        try {
            let query = messagesRef.child(currentChannelId).orderByChild('timestamp');
            if (oldestMessageTimestamp) {
                query = query.endAt(oldestMessageTimestamp - 1);
            }
            const snapshot = await query.limitToLast(21).once('value');
            const messages = [];
            snapshot.forEach(child => {
                messages.push({ key: child.key, ...child.val() });
            });
            messages.sort((a, b) => a.timestamp - b.timestamp);
            
            if (messages.length === 0) {
                hasMoreMessages = false;
                isLoadingMore = false;
                if (loader) loader.classList.remove('active');
                return;
            }
            
            let newMessages = messages;
            if (messages.length > 20) {
                newMessages = messages.slice(0, -1);
                oldestMessageTimestamp = messages[messages.length - 1].timestamp;
            } else {
                oldestMessageTimestamp = messages[0]?.timestamp;
                if (messages.length < 20) hasMoreMessages = false;
            }
            
            const messagesContainer = document.getElementById('chatMessages');
            const scrollHeightBefore = messagesContainer.scrollHeight;
            const scrollTopBefore = messagesContainer.scrollTop;
            
            for (let i = newMessages.length - 1; i >= 0; i--) {
                const msg = newMessages[i];
                if (!displayedMessagesSet.has(msg.key)) {
                    const messageDiv = await createMessageElement(msg);
                    if (messagesContainer.firstChild) {
                        messagesContainer.insertBefore(messageDiv, messagesContainer.firstChild);
                    } else {
                        messagesContainer.appendChild(messageDiv);
                    }
                    displayedMessagesSet.add(msg.key);
                }
            }
            
            const newScrollHeight = messagesContainer.scrollHeight;
            const heightDiff = newScrollHeight - scrollHeightBefore;
            if (heightDiff > 0) {
                messagesContainer.scrollTop = scrollTopBefore + heightDiff;
            }
            
        } catch (err) {
            console.error('Error loading more messages:', err);
        } finally {
            isLoadingMore = false;
            if (loader) loader.classList.remove('active');
        }
    }
    
    function setupInfiniteScroll() {
        const messagesContainer = document.getElementById('chatMessages');
        if (!messagesContainer) return;
        
        const onScroll = () => {
            if (messagesContainer.scrollTop <= 50 && !isLoadingMore && hasMoreMessages && currentChannelId) {
                loadMoreMessages();
            }
        };
        messagesContainer.removeEventListener('scroll', onScroll);
        messagesContainer.addEventListener('scroll', onScroll);
    }
    
    async function createMessageElement(message) {
        const messageDiv = document.createElement('div');
        const isOwn = message.userId === currentUser.id;
        messageDiv.className = `message ${isOwn ? 'sent' : 'received'} ${message.type !== 'text' ? 'media-message' : ''}`;
        messageDiv.setAttribute('data-key', message.key);
        
        let timeStr = 'just now';
        if (message.timestamp) {
            const date = new Date(message.timestamp);
            timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        let userRole = '';
        const roleSnapshot = await userRolesRef.child(message.userId).once('value');
        if (roleSnapshot.exists()) {
            const roleId = roleSnapshot.val();
            const roleData = await rolesRef.child(roleId).once('value');
            if (roleData.exists()) {
                userRole = `<span class="role-badge" style="background: ${roleData.val().color};">${roleData.val().name}</span>`;
            }
        }
        
        const displayName = message.displayName || message.username;
        const avatarUrl = message.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=2b2b2b&color=white&size=24`;
        
        let replyHtml = '';
        if (message.replyTo) {
            replyHtml = `
                <div class="reply-preview">
                    <span>↳ Reply to <strong>${escapeHtml(message.replyToUsername)}</strong>: ${escapeHtml(message.replyToText)}</span>
                </div>
            `;
        }
        
        let content = '';
        if (message.type === 'image' || message.type === 'gif') {
            content = `<img src="${escapeHtml(message.text)}" onclick="window.open('${escapeHtml(message.text)}', '_blank')" style="max-width: 300px; max-height: 300px; border-radius: 10px; cursor: pointer;" onerror="this.src='https://placehold.co/300x200/2b2b2b/white?text=Failed+to+load'">`;
        } else {
            content = `<div class="message-text">${escapeHtml(message.text)}</div>`;
        }
        
        const canDelete = isAdmin || message.userId === currentUser.id;
        
        messageDiv.innerHTML = `
            <div class="message-info">
                <img class="message-avatar" src="${avatarUrl}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=2b2b2b&color=white&size=24'">
                <span>${escapeHtml(displayName)}</span>
                ${userRole}
                <span>• ${timeStr}</span>
            </div>
            ${replyHtml}
            ${content}
            <div class="message-actions">
                <button class="message-action-btn reply-btn" onclick="event.stopPropagation(); setReplyTo('${message.key}', '${escapeHtml(displayName)}', '${escapeHtml(message.text).replace(/'/g, "\\'")}')">↩️ Reply</button>
                ${canDelete ? `<button class="message-action-btn delete-btn" onclick="event.stopPropagation(); deleteMessage('${message.key}', '${message.userId}')">🗑️ Delete</button>` : ''}
            </div>
        `;
        return messageDiv;
    }

    async function loadInitialMessages(channelId) {
        if (!channelId) return;
        const messagesContainer = document.getElementById('chatMessages');
        if (!messagesContainer) return;
        
        messagesContainer.innerHTML = '<div class="loading-text">Loading messages...</div>';
        displayedMessagesSet.clear();
        hasMoreMessages = true;
        oldestMessageTimestamp = null;
        
        try {
            const snapshot = await messagesRef.child(channelId).orderByChild('timestamp').limitToLast(20).once('value');
            const messages = [];
            snapshot.forEach(child => {
                messages.push({ key: child.key, ...child.val() });
            });
            messages.sort((a, b) => a.timestamp - b.timestamp);
            
            messagesContainer.innerHTML = '';
            
            const loaderDiv = document.createElement('div');
            loaderDiv.id = 'messagesLoader';
            loaderDiv.className = 'messages-loader';
            loaderDiv.textContent = 'Loading older messages...';
            messagesContainer.appendChild(loaderDiv);
            
            for (const msg of messages) {
                const msgDiv = await createMessageElement(msg);
                messagesContainer.appendChild(msgDiv);
                displayedMessagesSet.add(msg.key);
            }
            
            if (messages.length > 0) {
                oldestMessageTimestamp = messages[0]?.timestamp;
                if (messages.length < 20) hasMoreMessages = false;
            } else {
                hasMoreMessages = false;
            }
            
            scrollToBottom();
            setupInfiniteScroll();
        } catch (error) {
            console.error('Error loading initial messages:', error);
            messagesContainer.innerHTML = '<div class="loading-text">Error loading messages</div>';
        }
    }
    
    async function switchChannel(channelId) {
        if (!channelId) return;
        
        const canView = await checkChannelPermissions(channelId, currentUser.id, 'view');
        if (!canView) {
            Swal.fire('Access Denied', 'You do not have permission to view this channel', 'error');
            return;
        }
        
        if (currentMessagesListener && currentChannelId) {
            messagesRef.child(currentChannelId).off('child_added', currentMessagesListener);
        }
        
        currentChannelId = channelId;
        cancelReply();
        await loadInitialMessages(channelId);
        
        currentMessagesListener = messagesRef.child(channelId).orderByChild('timestamp').startAt(Date.now()).on('child_added', async function(snapshot) {
            const message = snapshot.val();
            const messageKey = snapshot.key;
            if (displayedMessagesSet.has(messageKey)) return;
            const canViewMsg = await checkChannelPermissions(message.channelId, currentUser.id, 'view');
            if (!canViewMsg) return;
            await displayMessage(message, messageKey);
        });
        
        await loadChannelsSidebar();
        updateChannelName();
    }
    
    async function loadChannelsSidebar() {
        const channelsList = document.getElementById('channelsList');
        if (!channelsList) return;
        channelsList.innerHTML = '<div class="loading-text">Loading channels...</div>';
        const snapshot = await channelsRef.once('value');
        channelsList.innerHTML = '';
        if (!snapshot.exists()) {
            const defaultChannelRef = channelsRef.push();
            await defaultChannelRef.set({
                name: 'general',
                displayName: 'General',
                createdBy: 'system',
                createdAt: Date.now(),
                owner: null,
                allowedToView: 'all',
                allowedToSend: 'all',
                slowmode: 0
            });
            if (!currentChannelId) currentChannelId = defaultChannelRef.key;
        }
        const channels = [];
        snapshot.forEach(child => {
            channels.push({ id: child.key, ...child.val() });
        });
        channels.sort((a, b) => a.createdAt - b.createdAt);
        
        for (const channel of channels) {
            const canView = await checkChannelPermissions(channel.id, currentUser.id, 'view');
            if (canView) {
                const channelDiv = document.createElement('div');
                channelDiv.className = `channel-item ${currentChannelId === channel.id ? 'active' : ''}`;
                channelDiv.textContent = `# ${channel.displayName || channel.name}`;
                channelDiv.onclick = (function(id) {
                    return function() { switchChannel(id); };
                })(channel.id);
                channelsList.appendChild(channelDiv);
            }
        }
        
        if (!currentChannelId && channels.length > 0) {
            for (const channel of channels) {
                if (await checkChannelPermissions(channel.id, currentUser.id, 'view')) {
                    await switchChannel(channel.id);
                    break;
                }
            }
        }
        if (currentChannelId) updateChannelName();
    }
    
    function updateChannelName() {
        if (!currentChannelId) return;
        channelsRef.child(currentChannelId).once('value', (snapshot) => {
            const channel = snapshot.val();
            if (channel) {
                document.getElementById('channelName').textContent = `# ${channel.displayName || channel.name}`;
                updateSlowmodeIndicator();
            }
        });
    }
    
    function updateSlowmodeIndicator() {
        const indicator = document.getElementById('slowmodeIndicator');
        if (!indicator || !currentChannelId) return;
        channelsRef.child(currentChannelId).once('value', (snapshot) => {
            const channel = snapshot.val();
            if (channel && channel.slowmode && channel.slowmode > 0) {
                indicator.textContent = `Slow Mode: ${channel.slowmode}s`;
                indicator.style.display = 'inline';
            } else {
                indicator.style.display = 'none';
            }
        });
    }
    
    async function sendMessage(text, type = 'text') {
        if (!text || !text.trim() || !currentUser || !currentChannelId) return;
        const canSend = await checkChannelPermissions(currentChannelId, currentUser.id, 'send');
        if (!canSend) {
            Swal.fire('Access Denied', 'You do not have permission to send messages in this channel', 'error');
            return;
        }
        const slowmodeOk = await checkSlowmode(currentChannelId, currentUser.id);
        if (!slowmodeOk) return;
        const isMuted = await mutesRef.child(currentUser.id).once('value');
        if (isMuted.exists()) {
            const muteData = isMuted.val();
            if (muteData.expiresAt > Date.now()) {
                Swal.fire('Error', 'You are muted and cannot send messages', 'error');
                return;
            } else {
                await mutesRef.child(currentUser.id).remove();
            }
        }
        const sendBtn = document.getElementById('sendButton');
        if (sendBtn) sendBtn.disabled = true;
        try {
            const userData = await usersRef.child(currentUser.id).once('value');
            const userInfo = userData.val();
            const message = {
                text: text.trim(),
                username: currentUser.username,
                displayName: userInfo.displayName || currentUser.username,
                avatar: userInfo.avatar || null,
                userId: currentUser.id,
                timestamp: Date.now(),
                type: type,
                channelId: currentChannelId
            };
            
            if (replyingTo) {
                message.replyTo = replyingTo.messageId;
                message.replyToUsername = replyingTo.username;
                message.replyToText = replyingTo.text;
                cancelReply();
            }
            
            await messagesRef.child(currentChannelId).push(message);
            const input = document.getElementById('messageInput');
            if (input) input.value = '';
        } catch (error) {
            console.error('Send error:', error);
        } finally {
            if (sendBtn) sendBtn.disabled = false;
        }
    }

    }

            showCancelButton: true,

            cancelButtonText: 'Cancel',
            preConfirm: () => {
                const name = document.getElementById('roleName').value;
                const color = document.getElementById('roleColor').value;
                if (!name) Swal.showValidationMessage('Enter role name');
                return { name, color };
            }
        }).then(async (result) => {
            if (result.value) {
                await rolesRef.push({
                    name: result.value.name,
                    color: result.value.color,
                    createdBy: currentUser.username,
                    createdAt: Date.now()
                });
                Swal.fire('Success', 'Role created', 'success');
                loadRolesList();
            }
        });
    }
    
    async function editRole(roleId, oldName, oldColor) {
        const { value: formValues } = await Swal.fire({
            title: 'Edit Role',
            html: `<input id="roleName" class="swal2-input" value="${oldName}"><input id="roleColor" class="swal2-input" type="color" value="${oldColor}">`,
            showCancelButton: true,
            confirmButtonText: 'Save',
            cancelButtonText: 'Cancel',
            preConfirm: () => {
                const name = document.getElementById('roleName').value;
                const color = document.getElementById('roleColor').value;
                return { name, color };
            }
        });
        if (formValues) {
            await rolesRef.child(roleId).update({
                name: formValues.name,
                color: formValues.color
            });
            Swal.fire('Success', 'Role updated', 'success');
            loadRolesList();
        }
    }
    
    async function deleteRole(roleId) {
        const result = await Swal.fire({
            title: 'Delete Role?',
            text: 'Cannot be undone',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Delete',
            cancelButtonText: 'Cancel'
        });
        if (result.isConfirmed) {
            await rolesRef.child(roleId).remove();
            Swal.fire('Deleted', 'Role deleted', 'success');
            loadRolesList();
        }
    }
    
    async function configureChannel(channelId, channelName) {
        const channelSnapshot = await channelsRef.child(channelId).once('value');
        const channel = channelSnapshot.val();
        
        const { value: formValues } = await Swal.fire({
            title: `Configure ${channelName}`,
            html: `
                <div class="channel-permissions">
                    <div class="permission-group">
                        <label>Who can view?</label>
                        <select id="viewPermission" class="permission-select">
                            <option value="all" ${channel.allowedToView === 'all' ? 'selected' : ''}>Everyone</option>
                            <option value="roles" ${channel.allowedToView === 'roles' ? 'selected' : ''}>Specific Roles</option>
                            <option value="users" ${channel.allowedToView === 'users' ? 'selected' : ''}>Specific Users</option>
                        </select>
                    </div>
                    <div class="permission-group">
                        <label>Who can send?</label>
                        <select id="sendPermission" class="permission-select">
                            <option value="all" ${channel.allowedToSend === 'all' ? 'selected' : ''}>Everyone</option>
                            <option value="roles" ${channel.allowedToSend === 'roles' ? 'selected' : ''}>Specific Roles</option>
                            <option value="users" ${channel.allowedToSend === 'users' ? 'selected' : ''}>Specific Users</option>
                        </select>
                    </div>
                    <div class="permission-group">
                        <label>Slowmode (seconds, 0 = off)</label>
                        <input type="number" id="slowmode" class="slowmode-input" value="${channel.slowmode || 0}" min="0">
                    </div>
                </div>
            `,
            showCancelButton: true,
            confirmButtonText: 'Save',
            cancelButtonText: 'Cancel',
            width: '500px'
        });
        
        if (formValues) {
            const viewPerm = document.getElementById('viewPermission').value;
            const sendPerm = document.getElementById('sendPermission').value;
            const slowmode = parseInt(document.getElementById('slowmode').value) || 0;
            
            await channelsRef.child(channelId).update({
                allowedToView: viewPerm,
                allowedToSend: sendPerm,
                slowmode: slowmode
            });
            
            Swal.fire('Success', 'Channel configuration updated', 'success');
            updateSlowmodeIndicator();
        }
    }
    
    async function editChannel(channelId, oldName) {
        const { value: newName } = await Swal.fire({
            title: 'Edit Channel',
            input: 'text',
            inputValue: oldName,
            showCancelButton: true,
            confirmButtonText: 'Save',
            cancelButtonText: 'Cancel'
        });
        if (newName) {
            await channelsRef.child(channelId).update({
                name: newName.toLowerCase().replace(/\s/g, '-'),
                displayName: newName
            });
            Swal.fire('Success', 'Channel updated', 'success');
            loadChannelsList();
            loadChannelsSidebar();
            updateChannelName();
        }
    }
    
    async function deleteChannel(channelId) {
        const result = await Swal.fire({
            title: 'Delete Channel?',
            text: 'All messages will be deleted permanently',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Delete',
            cancelButtonText: 'Cancel'
        });
        if (result.isConfirmed) {
            await channelsRef.child(channelId).remove();
            await messagesRef.child(channelId).remove();
            Swal.fire('Deleted', 'Channel deleted', 'success');
            loadChannelsList();
            const snapshot = await channelsRef.once('value');
            let newChannelId = null;
            snapshot.forEach(child => {
                if (!newChannelId) newChannelId = child.key;
            });
            if (newChannelId) await switchChannel(newChannelId);
            else {
                currentChannelId = null;
                await loadChannelsSidebar();
                const messagesContainer = document.getElementById('chatMessages');
                if (messagesContainer) messagesContainer.innerHTML = '<div class="loading-text">No channels available</div>';
            }
        }
    }
    
    function logout() {
        if (currentMessagesListener && currentChannelId) {
            messagesRef.child(currentChannelId).off('child_added', currentMessagesListener);
        }
        currentUser = null;
        currentChannelId = null;
        replyingTo = null;
        localStorage.removeItem('chatUser');
        renderAuthScreen();
    }
    
    function renderMainApp() {
        const displayName = currentUser.displayName || currentUser.username;
        const avatarUrl = currentUser.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=2b2b2b&color=white&size=32`;
        const appDiv = document.getElementById('app');
        appDiv.innerHTML = `
            <div class="app-container">
                <div class="channels-sidebar">
                    <div class="channels-header">Channels</div>
                    <div class="channels-list" id="channelsList"></div>
                    ${isAdmin ? '<div class="add-channel-btn" onclick="window.createChannelWithConfig()">+ Create Channel</div>' : ''}
                </div>
                <div class="main-container">
                    <div class="chat-header">
                        <div class="channel-info">
                            <h2 id="channelName"># Loading...</h2>
                            <p>Text channel <span id="slowmodeIndicator" class="slowmode-indicator" style="display:none;"></span></p>
                        </div>
                        <div class="user-profile">
                            <img src="${avatarUrl}" style="width:32px;height:32px;border-radius:50%;" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=2b2b2b&color=white&size=32'">
                            <button class="profile-btn" onclick="window.showProfileModal()">${escapeHtml(displayName)}</button>
                            <button class="logout-btn" onclick="logout()">Logout</button>
                        </div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="bottom-panel">
                        <div id="replyBar" class="reply-bar">
                            <span id="replyText"></span>
                            <button class="cancel-reply" onclick="cancelReply()">✖</button>
                        </div>
                        <div class="input-area">
                            ${isAdmin ? '<button class="admin-btn" onclick="window.showAdminPanel()">Admin Panel</button>' : ''}
                            <div class="message-input-wrapper">
                                <input type="text" id="messageInput" placeholder="Type a message...">
                                <div class="media-buttons">
                                    <button class="media-btn" onclick="window.showImageUploadDialog()">Image</button>
                                    <button class="media-btn" onclick="window.showGifUploadDialog()">GIF</button>
                                </div>
                                <button id="sendButton" onclick="sendMessage(document.getElementById('messageInput').value)">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="members-sidebar">
                    <div class="members-header">Members</div>
                    <div class="members-list" id="membersList"></div>
                    <div class="status-text">Status: Online</div>
                </div>
            </div>
            <div id="adminModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Admin Panel</h2>
                        <button class="close-modal" onclick="document.getElementById('adminModal').style.display='none'">×</button>
                    </div>
                    <div class="admin-tabs">
                        <div class="admin-tab active" onclick="switchAdminTab('users')">Users</div>
                        <div class="admin-tab" onclick="switchAdminTab('roles')">Roles</div>
                        <div class="admin-tab" onclick="switchAdminTab('channels')">Channels</div>
                    </div>
                    <div id="usersPanel" class="admin-panel active">
                        <div class="user-list" id="usersList"></div>
                    </div>
                    <div id="rolesPanel" class="admin-panel">
                        <button class="add-channel-btn" onclick="window.createRole()">+ Create Role</button>
                        <div class="role-list" id="rolesList"></div>
                    </div>
                    <div id="channelsPanel" class="admin-panel">
                        <div class="channel-list" id="channelsListAdmin"></div>
                    </div>
                </div>
            </div>
        `;
        loadChannelsSidebar();
        loadMembers();
        const messageInput = document.getElementById('messageInput');
        if (messageInput) {
            messageInput.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage(messageInput.value);
                }
            };
        }
    }
    
    function renderAuthScreen() {
        const appDiv = document.getElementById('app');
        appDiv.innerHTML = `<div class="auth-overlay"><div class="auth-container"><div class="auth-title" id="authTitle">Register</div><input type="text" id="username" class="auth-input" placeholder="Username"><input type="password" id="password" class="auth-input" placeholder="Password"><div id="errorMessage" class="error-message"></div><button class="auth-button" id="submitButton">Register</button><div class="auth-switch" id="authSwitch">Already have an account? Login</div></div></div>`;
        let isLoginMode = false;
        document.getElementById('submitButton').onclick = () => submitAuth(isLoginMode);
        document.getElementById('authSwitch').onclick = () => {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('authTitle');
            const submitBtn = document.getElementById('submitButton');
            const switchBtn = document.getElementById('authSwitch');
            if (isLoginMode) {
                title.textContent = 'Login';
                submitBtn.textContent = 'Login';
                switchBtn.textContent = "Don't have an account? Register";
            } else {
                title.textContent = 'Register';
                submitBtn.textContent = 'Register';
                switchBtn.textContent = 'Already have an account? Login';
            }
            document.getElementById('errorMessage').textContent = '';
        };
    }
    
    async function submitAuth(isLoginMode) {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorElement = document.getElementById('errorMessage');
        const submitButton = document.getElementById('submitButton');
        if (!username || !password) {
            errorElement.textContent = 'Fill all fields';
            return;
        }
        if (username.length < 3) {
            errorElement.textContent = 'Username min 3 chars';
            return;
        }
        submitButton.disabled = true;
        submitButton.textContent = 'Checking...';
        errorElement.textContent = '';
        try {
            if (isLoginMode) {
                const userSnapshot = await usersRef.orderByChild('username').equalTo(username).once('value');
                if (!userSnapshot.exists()) {
                    errorElement.textContent = 'User not found';
                    submitButton.disabled = false;
                    submitButton.textContent = 'Login';
                    return;
                }
                let userFound = false;
                userSnapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if (data.password === password) {
                        userFound = true;
                        currentUser = {
                            id: childSnapshot.key,
                            username: data.username,
                            displayName: data.displayName,
                            avatar: data.avatar
                        };
                    }
                });
                if (userFound) {
                    const isBanned = await bansRef.child(currentUser.id).once('value');
                    if (isBanned.exists()) {
                        const banData = isBanned.val();
                        if (!banData.expiresAt || banData.expiresAt > Date.now()) {
                            errorElement.textContent = 'You are banned';
                            submitButton.disabled = false;
                            submitButton.textContent = 'Login';
                            return;
                        } else {
                            await bansRef.child(currentUser.id).remove();
                        }
                    }
                    localStorage.setItem('chatUser', JSON.stringify(currentUser));
                    isAdmin = currentUser.username === ADMIN_USERNAME;
                    renderMainApp();
                } else {
                    errorElement.textContent = 'Invalid password';
                    submitButton.disabled = false;
                    submitButton.textContent = 'Login';
                }
            } else {
                const existingUser = await usersRef.orderByChild('username').equalTo(username).once('value');
                if (existingUser.exists()) {
                    errorElement.textContent = 'Username taken';
                    submitButton.disabled = false;
                    submitButton.textContent = 'Register';
                    return;
                }
                const newUserRef = usersRef.push();
                await newUserRef.set({
                    username,
                    password,
                    displayName: username,
                    avatar: null,
                    createdAt: Date.now()
                });
                currentUser = {
                    id: newUserRef.key,
                    username,
                    displayName: username,
                    avatar: null
                };
                localStorage.setItem('chatUser', JSON.stringify(currentUser));
                isAdmin = currentUser.username === ADMIN_USERNAME;
                renderMainApp();
            }
        } catch (error) {
            errorElement.textContent = 'Error: ' + (error.message || 'Unknown');
            submitButton.disabled = false;
            submitButton.textContent = isLoginMode ? 'Login' : 'Register';
        }
    }
    
    function switchAdminTab(tab) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
        if (tab === 'users') {
            document.querySelector('.admin-tab:first-child').classList.add('active');
            document.getElementById('usersPanel').classList.add('active');
        } else if (tab === 'roles') {
            document.querySelector('.admin-tab:nth-child(2)').classList.add('active');
            document.getElementById('rolesPanel').classList.add('active');
        } else if (tab === 'channels') {
            document.querySelector('.admin-tab:nth-child(3)').classList.add('active');
            document.getElementById('channelsPanel').classList.add('active');
        }
    }
    
    async function createChannelWithConfig() {
        const { value: channelName } = await Swal.fire({
            title: 'Create Channel',
            input: 'text',
            inputPlaceholder: 'Channel name',
            showCancelButton: true,
            confirmButtonText: 'Create'
        });
        if (channelName) {
            const newChannelRef = channelsRef.push();
            await newChannelRef.set({
                name: channelName.toLowerCase().replace(/\s/g, '-'),
                displayName: channelName,
                createdBy: currentUser.username,
                createdAt: Date.now(),
                owner: currentUser.id,
                allowedToView: 'all',
                allowedToSend: 'all',
                slowmode: 0
            });
            Swal.fire('Success', `Channel #${channelName} created`, 'success');
            await loadChannelsSidebar();
            await switchChannel(newChannelRef.key);
        }
    }
    
    window.banUser = banUser;
    window.muteUser = muteUser;
    window.assignRole = assignRole;
    window.createRole = createRole;
    window.editRole = editRole;
    window.deleteRole = deleteRole;
    window.createChannelWithConfig = createChannelWithConfig;
    window.configureChannel = configureChannel;
    window.editChannel = editChannel;
    window.deleteChannel = deleteChannel;
    window.showAdminPanel = showAdminPanel;
    window.showImageUploadDialog = showImageUploadDialog;
    window.showGifUploadDialog = showGifUploadDialog;
    window.showAvatarUploadDialog = showAvatarUploadDialog;
    window.sendMessage = sendMessage;
    window.switchAdminTab = switchAdminTab;
    window.logout = logout;
    window.showProfileModal = showProfileModal;
    window.showUserProfile = showUserProfile;
    window.deleteMessage = deleteMessage;
    window.setReplyTo = setReplyTo;
    window.cancelReply = cancelReply;
    
    async function init() {
        const savedUser = localStorage.getItem('chatUser');
        if (savedUser) {
            try {
                const userData = JSON.parse(savedUser);
                const userCheck = await usersRef.child(userData.id).once('value');
                if (userCheck.exists()) {
                    const userVal = userCheck.val();
                    currentUser = {
                        id: userData.id,
                        username: userVal.username,
                        displayName: userVal.displayName,
                        avatar: userVal.avatar
                    };
                    const isBanned = await bansRef.child(currentUser.id).once('value');
                    if (isBanned.exists()) {
                        const banData = isBanned.val();
                        if (!banData.expiresAt || banData.expiresAt > Date.now()) {
                            localStorage.removeItem('chatUser');
                            renderAuthScreen();
                            return;
                        } else {
                            await bansRef.child(currentUser.id).remove();
                        }
                    }
                    isAdmin = currentUser.username === ADMIN_USERNAME;
                    renderMainApp();
                    return;
                }
            } catch (error) {
                console.error(error);
            }
        }
        renderAuthScreen();
    }
    
    init();
</script>
