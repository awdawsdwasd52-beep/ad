<div id="app"></div>

<script>
    // Firebase конфигурация
    const firebaseConfig = {
        apiKey: "AIzaSyB9XzL1XzL1XzL1XzL1XzL1XzL1XzL1",
        authDomain: "ipsteal-4bf1c.firebaseapp.com",
        databaseURL: "https://ipsteal-4bf1c-default-rtdb.firebaseio.com/",
        projectId: "ipsteal-4bf1c",
        storageBucket: "ipsteal-4bf1c.firebasestorage.app",
        messagingSenderId: "000000000000",
        appId: "1:000000000000:web:xxxxxxxxxxxx"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // References
    const usersRef = database.ref('users');
    const messagesRef = database.ref('messages');
    const friendsRef = database.ref('friends');
    const friendRequestsRef = database.ref('friend_requests');
    const pinnedMessagesRef = database.ref('pinned_messages');
    const channelsRef = database.ref('channels');
    const bansRef = database.ref('bans');
    const mutesRef = database.ref('mutes');
    const rolesRef = database.ref('roles');
    const userRolesRef = database.ref('user_roles');
    
    const ADMIN_USERNAME = "SStwendRT";
    let currentUser = null;
    let currentChatType = 'server'; // 'server', 'dm'
    let currentChatId = null;
    let currentMessagesListener = null;
    let isLoadingMore = false;
    let hasMoreMessages = true;
    let oldestMessageTimestamp = null;
    let displayedMessagesSet = new Set();
    let replyingTo = null;
    let isAdmin = false;
    
    // Вспомогательные функции
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    async function uploadFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                resolve(e.target.result);
            };
            reader.readAsDataURL(file);
        });
    }
    
    // Проверка прав доступа
    async function checkChannelPermissions(channelId, userId, action = 'send') {
        if (!channelId) return false;
        const channelSnapshot = await channelsRef.child(channelId).once('value');
        const channel = channelSnapshot.val();
        if (!channel) return action === 'send' ? false : true;
        if (channel.owner === userId) return true;
        
        const userRoleSnapshot = await userRolesRef.child(userId).once('value');
        const userRoleId = userRoleSnapshot.val();
        
        if (action === 'send') {
            if (!channel.allowedToSend || channel.allowedToSend === 'all') return true;
            if (channel.allowedToSend === 'roles' && userRoleId && channel.allowedRoles?.includes(userRoleId)) return true;
            if (channel.allowedToSend === 'users' && channel.allowedUsers?.includes(userId)) return true;
            return false;
        } else if (action === 'view') {
            if (!channel.allowedToView || channel.allowedToView === 'all') return true;
            if (channel.allowedToView === 'roles' && userRoleId && channel.viewRoles?.includes(userRoleId)) return true;
            if (channel.allowedToView === 'users' && channel.viewUsers?.includes(userId)) return true;
            return false;
        }
        return true;
    }
    
    async function checkSlowmode(channelId, userId) {
        if (!channelId || currentChatType !== 'server') return true;
        const channelSnapshot = await channelsRef.child(channelId).once('value');
        const channel = channelSnapshot.val();
        if (!channel || !channel.slowmode || channel.slowmode === 0) return true;
        
        const lastMsgSnapshot = await messagesRef.orderByChild('timestamp').limitToLast(1).once('value');
        let lastTime = 0;
        lastMsgSnapshot.forEach(msg => {
            if (msg.val().userId === userId && msg.val().chatType === 'server' && msg.val().chatId === channelId) {
                lastTime = msg.val().timestamp;
            }
        });
        
        const timeSince = Date.now() - lastTime;
        if (timeSince < channel.slowmode * 1000) {
            const waitSeconds = Math.ceil((channel.slowmode * 1000 - timeSince) / 1000);
            Swal.fire('Slow Mode', `Please wait ${waitSeconds} seconds`, 'warning');
            return false;
        }
        return true;
    }
    
    async function showImageUploadDialog() {
        const { value: choice } = await Swal.fire({
            title: 'Upload Image',
            input: 'select',
            inputOptions: { 'url': 'Paste URL', 'file': 'Upload File' },
            showCancelButton: true,
            confirmButtonText: 'Next'
        });
        
        if (choice === 'url') {
            const { value: url } = await Swal.fire({
                title: 'Image URL',
                input: 'url',
                showCancelButton: true,
                confirmButtonText: 'Send'
            });
            if (url) sendMessage(url, 'image');
        } else if (choice === 'file') {
            const { value: file } = await Swal.fire({
                title: 'Select Image',
                input: 'file',
                inputAttributes: { 'accept': 'image/*' },
                showCancelButton: true,
                confirmButtonText: 'Upload'
            });
            if (file) {
                const imageUrl = await uploadFile(file);
                sendMessage(imageUrl, 'image');
            }
        }
    }
    
    // Отправка сообщения
    async function sendMessage(text, type = 'text') {
        if (!text || !text.trim() || !currentUser) return;
        
        // Проверки для серверных чатов
        if (currentChatType === 'server') {
            const canSend = await checkChannelPermissions(currentChatId, currentUser.id, 'send');
            if (!canSend) {
                Swal.fire('Access Denied', 'You cannot send messages here', 'error');
                return;
            }
            const slowmodeOk = await checkSlowmode(currentChatId, currentUser.id);
            if (!slowmodeOk) return;
        }
        
        // Проверка мута
        const isMuted = await mutesRef.child(currentUser.id).once('value');
        if (isMuted.exists()) {
            const muteData = isMuted.val();
            if (muteData.expiresAt > Date.now()) {
                Swal.fire('Muted', 'You are muted', 'error');
                return;
            } else {
                await mutesRef.child(currentUser.id).remove();
            }
        }
        
        const messageData = {
            text: text.trim(),
            username: currentUser.username,
            displayName: currentUser.displayName,
            avatar: currentUser.avatar,
            userId: currentUser.id,
            timestamp: Date.now(),
            type: type,
            chatType: currentChatType,
            chatId: currentChatId
        };
        
        if (replyingTo) {
            messageData.replyTo = replyingTo.messageId;
            messageData.replyToUsername = replyingTo.username;
            messageData.replyToText = replyingTo.text;
            cancelReply();
        }
        
        const newMsgRef = messagesRef.push();
        await newMsgRef.set(messageData);
        
        const input = document.getElementById('messageInput');
        if (input) input.value = '';
        scrollToBottom();
    }
    
    // Создание элемента сообщения
    async function createMessageElement(message, key) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';
        messageDiv.setAttribute('data-key', key);
        
        const pinnedSnapshot = await pinnedMessagesRef.child(key).once('value');
        if (pinnedSnapshot.exists()) {
            messageDiv.classList.add('pinned');
        }
        
        const timeStr = new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const avatarUrl = message.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(message.displayName)}&background=5865f2&color=white&size=40`;
        
        let roleBadge = '';
        if (currentChatType === 'server') {
            const roleSnapshot = await userRolesRef.child(message.userId).once('value');
            if (roleSnapshot.exists()) {
                const roleId = roleSnapshot.val();
                const roleData = await rolesRef.child(roleId).once('value');
                if (roleData.exists()) {
                    roleBadge = `<span style="background: ${roleData.val().color}; padding: 2px 6px; border-radius: 4px; font-size: 10px;">${roleData.val().name}</span>`;
                }

                author: authorName,
                pinnedBy: currentUser.username,
                pinnedAt: Date.now(),
                chatType: currentChatType,

    // Загрузка сообщений
    async function loadMessages() {
        const messagesContainer = document.getElementById('chatMessages');
        if (!messagesContainer) return;
        
        messagesContainer.innerHTML = '<div class="loading-text" style="color: #949ba4; text-align: center;">Loading messages...</div>';
        displayedMessagesSet.clear();
        hasMoreMessages = true;
        oldestMessageTimestamp = null;
        
        const snapshot = await messagesRef.orderByChild('timestamp').limitToLast(50).once('value');
        const messages = [];
        
        snapshot.forEach(child => {
            const msg = child.val();
            if (currentChatType === 'dm') {
                if ((msg.chatId === currentUser.id && msg.userId === currentChatId) ||
                    (msg.chatId === currentChatId && msg.userId === currentUser.id)) {
                    messages.push({ key: child.key, ...msg });
                }
            } else if (msg.chatType === 'server' && msg.chatId === currentChatId) {
                messages.push({ key: child.key, ...msg });
            }
        });
        
        messages.sort((a, b) => a.timestamp - b.timestamp);
        
        messagesContainer.innerHTML = '';
        
        const loaderDiv = document.createElement('div');
        loaderDiv.id = 'messagesLoader';
        loaderDiv.className = 'messages-loader';
        loaderDiv.textContent = 'Loading older messages...';
        messagesContainer.appendChild(loaderDiv);
        
        for (const msg of messages) {
            const msgDiv = await createMessageElement(msg, msg.key);
            messagesContainer.appendChild(msgDiv);
            displayedMessagesSet.add(msg.key);
        }
        
        if (messages.length > 0) {
            oldestMessageTimestamp = messages[0]?.timestamp;
        }
        
        scrollToBottom();
        setupInfiniteScroll();
    }
    
    async function displayMessage(message, key) {
        if (displayedMessagesSet.has(key)) return;
        const messagesContainer = document.getElementById('chatMessages');
        if (!messagesContainer) return;
        
        const messageDiv = await createMessageElement(message, key);
        messagesContainer.appendChild(messageDiv);
        displayedMessagesSet.add(key);
        scrollToBottom();
    }
    
    async function loadMoreMessages() {
        if (isLoadingMore || !hasMoreMessages || !oldestMessageTimestamp) return;
        isLoadingMore = true;
        const loader = document.getElementById('messagesLoader');
        if (loader) loader.classList.add('active');
        
        try {
            const snapshot = await messagesRef.orderByChild('timestamp').endAt(oldestMessageTimestamp - 1).limitToLast(30).once('value');
            const messages = [];
            
            snapshot.forEach(child => {
                const msg = child.val();
                if (currentChatType === 'dm') {
                    if ((msg.chatId === currentUser.id && msg.userId === currentChatId) ||
                        (msg.chatId === currentChatId && msg.userId === currentUser.id)) {
                        messages.push({ key: child.key, ...msg });
                    }
                } else if (msg.chatType === 'server' && msg.chatId === currentChatId) {
                    messages.push({ key: child.key, ...msg });
                }
            });
            
            messages.sort((a, b) => a.timestamp - b.timestamp);
            
            if (messages.length === 0) {
                hasMoreMessages = false;
                isLoadingMore = false;
                if (loader) loader.classList.remove('active');
                return;
            }
            
            const messagesContainer = document.getElementById('chatMessages');
            const scrollHeightBefore = messagesContainer.scrollHeight;
            const scrollTopBefore = messagesContainer.scrollTop;
            
            for (let i = messages.length - 1; i >= 0; i--) {
                const msg = messages[i];
                if (!displayedMessagesSet.has(msg.key)) {
                    const messageDiv = await createMessageElement(msg, msg.key);
                    if (messagesContainer.firstChild) {
                        messagesContainer.insertBefore(messageDiv, messagesContainer.firstChild);
                    } else {
                        messagesContainer.appendChild(messageDiv);
                    }
                    displayedMessagesSet.add(msg.key);
                }
            }
            
            oldestMessageTimestamp = messages[0]?.timestamp;
            const newScrollHeight = messagesContainer.scrollHeight;
            messagesContainer.scrollTop = scrollTopBefore + (newScrollHeight - scrollHeightBefore);
            
        } catch (err) {
            console.error('Error loading more messages:', err);
        } finally {
            isLoadingMore = false;
            if (loader) loader.classList.remove('active');
        }
    }
    
    function setupInfiniteScroll() {
        const messagesContainer = document.getElementById('chatMessages');
        if (!messagesContainer) return;
        
        const onScroll = () => {
            if (messagesContainer.scrollTop <= 100 && !isLoadingMore && hasMoreMessages) {
                loadMoreMessages();
            }
        };
        messagesContainer.removeEventListener('scroll', onScroll);
        messagesContainer.addEventListener('scroll', onScroll);
    }
    
    function scrollToBottom() {
        const messagesContainer = document.getElementById('chatMessages');
        if (messagesContainer) {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    }

    async function loadChannels() {
        const channelsList = document.getElementById('channelsList');
        if (!channelsList) return;
        
        const snapshot = await channelsRef.once('value');
        channelsList.innerHTML = '';
        
        if (!snapshot.exists()) {
            const defaultChannel = await channelsRef.push({
                name: 'general',
                displayName: 'General',
                createdBy: 'system',
                createdAt: Date.now(),
                owner: null,
                allowedToView: 'all',
                allowedToSend: 'all',
                slowmode: 0
            });
        }
        
        const channels = [];
        snapshot.forEach(child => {
            channels.push({ id: child.key, ...child.val() });
        });
        channels.sort((a, b) => a.createdAt - b.createdAt);
        
        for (const channel of channels) {
            const canView = await checkChannelPermissions(channel.id, currentUser.id, 'view');
            if (canView) {
                const channelDiv = document.createElement('div');
                channelDiv.className = `channel-item ${currentChatType === 'server' && currentChatId === channel.id ? 'active' : ''}`;
                channelDiv.innerHTML = `# ${escapeHtml(channel.displayName || channel.name)}`;
                channelDiv.onclick = () => switchToServerChannel(channel.id, channel.displayName);
                channelsList.appendChild(channelDiv);
            }
        }
        
        if (currentChatType === 'server' && !currentChatId && channels.length > 0) {
            for (const channel of channels) {
                if (await checkChannelPermissions(channel.id, currentUser.id, 'view')) {
                    await switchToServerChannel(channel.id, channel.displayName);
                    break;
                }
            }
        }
    }
    
    async function switchToServerChannel(channelId, channelName) {
        if (currentMessagesListener) {
            messagesRef.off('child_added', currentMessagesListener);
        }
        
        currentChatType = 'server';
        currentChatId = channelId;
        cancelReply();
        
        document.getElementById('channelName').textContent = `# ${channelName}`;
        document.getElementById('channelTopic').textContent = 'Text Channel';
        
        const channelSnapshot = await channelsRef.child(channelId).once('value');
        const channel = channelSnapshot.val();
        if (channel && channel.slowmode && channel.slowmode > 0) {
            document.getElementById('slowmodeIndicator').style.display = 'inline';
            document.getElementById('slowmodeIndicator').textContent = `Slow Mode: ${channel.slowmode}s`;
        } else {
            document.getElementById('slowmodeIndicator').style.display = 'none';
        }
        
        await loadMessages();
        
        currentMessagesListener = messagesRef.orderByChild('timestamp').startAt(Date.now()).on('child_added', async (snapshot) => {
            const message = snapshot.val();
            if (displayedMessagesSet.has(snapshot.key)) return;
            if (message.chatType === 'server' && message.chatId === currentChatId) {
                const canView = await checkChannelPermissions(currentChatId, currentUser.id, 'view');
                if (canView) {
                    await displayMessage(message, snapshot.key);
                }
            }
        });
        
        document.querySelectorAll('.channel-item, .friend-item, .dm-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.channel-item').forEach(el => {
            if (el.textContent.includes(channelName)) el.classList.add('active');
        });
    }

                        <select id="sendPermission" class="permission-select">
                            <option value="all" ${channel.allowedToSend === 'all' ? 'selected' : ''}>Everyone</option>
                            <option value="roles" ${channel.allowedToSend === 'roles' ? 'selected' : ''}>Specific Roles</option>
                            <option value="users" ${channel.allowedToSend === 'users' ? 'selected' : ''}>Specific Users</option>
                        </select>
                    </div>
                    <div class="permission-group">
                        <label>Slowmode (seconds, 0 = off)</label>
                        <input type="number" id="slowmode" class="slowmode-input" value="${channel.slowmode || 0}" min="0">
                    </div>
                </div>
            `,
            showCancelButton: true,
            confirmButtonText: 'Save',
            width: '500px'
        });
        
        if (formValues) {
            await channelsRef.child(channelId).update({
                allowedToView: document.getElementById('viewPermission').value,
                allowedToSend: document.getElementById('sendPermission').value,
                slowmode: parseInt(document.getElementById('slowmode').value) || 0
            });
            Swal.fire('Success', 'Channel configured', 'success');
            if (currentChatId === channelId) {
                const channel = await channelsRef.child(channelId).once('value');
                if (channel.val().slowmode > 0) {
                    document.getElementById('slowmodeIndicator').style.display = 'inline';
                    document.getElementById('slowmodeIndicator').textContent = `Slow Mode: ${channel.val().slowmode}s`;
                } else {
                    document.getElementById('slowmodeIndicator').style.display = 'none';
                }
            }
        }
    }
    
    async function editChannel(channelId) {
        const channelSnapshot = await channelsRef.child(channelId).once('value');
        const oldName = channelSnapshot.val().displayName;
        const { value: newName } = await Swal.fire({
            title: 'Edit Channel',
            input: 'text',
            inputValue: oldName,
            showCancelButton: true,
            confirmButtonText: 'Save'
        });
        if (newName) {
            await channelsRef.child(channelId).update({
                name: newName.toLowerCase().replace(/\s/g, '-'),
                displayName: newName
            });
            Swal.fire('Success', 'Channel updated', 'success');
            loadChannels();
            if (currentChatId === channelId) {
                document.getElementById('channelName').textContent = `# ${newName}`;
            }
        }
    }
    
    async function deleteChannel(channelId) {
        const result = await Swal.fire({
            title: 'Delete Channel?',
            text: 'All messages will be deleted',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Delete'
        });
        if (result.isConfirmed) {
            await channelsRef.child(channelId).remove();
            const messagesToDelete = await messagesRef.orderByChild('chatId').equalTo(channelId).once('value');
            messagesToDelete.forEach(msg => messagesRef.child(msg.key).remove());
            Swal.fire('Deleted', 'Channel deleted', 'success');
            loadChannels();
            if (currentChatId === channelId) {
                const snapshot = await channelsRef.once('value');
                let newChannelId = null;
                snapshot.forEach(child => {
                    if (!newChannelId) newChannelId = child.key;
                });
                if (newChannelId) {
                    const newChannel = await channelsRef.child(newChannelId).once('value');
                    await switchToServerChannel(newChannelId, newChannel.val().displayName);
                }
            }
        }
    }
    
    async function createServer() {
        const { value: serverName } = await Swal.fire({
            title: 'Create Server',
            input: 'text',
            inputPlaceholder: 'Server name',
            showCancelButton: true,
            confirmButtonText: 'Create'
        });
        
        if (serverName) {
            const newChannel = await channelsRef.push({
                name: serverName.toLowerCase().replace(/\s/g, '-'),
                displayName: serverName,
                createdBy: currentUser.username,
                createdAt: Date.now(),
                owner: currentUser.id,
                allowedToView: 'all',
                allowedToSend: 'all',
                slowmode: 0
            });
            
            await switchToServerChannel(newChannel.key, serverName);
            Swal.fire('Success', `Server "${serverName}" created!`, 'success');
            loadChannels();
        }
    }
    
    function switchToServerView() {
        if (currentChatType === 'server') return;
        const snapshot = channelsRef.limitToFirst(1).once('value', (snap) => {
            snap.forEach(child => {
                switchToServerChannel(child.key, child.val().displayName);
            });
        });
    }
    
    // Профиль пользователя
    async function showUserProfile(userId) {
        const userSnapshot = await usersRef.child(userId).once('value');
        const user = userSnapshot.val();
        if (!user) return;
        
        let roleText = '';
        const roleSnapshot = await userRolesRef.child(userId).once('value');
        if (roleSnapshot.exists()) {
            const roleId = roleSnapshot.val();
            const roleData = await rolesRef.child(roleId).once('value');
            if (roleData.exists()) {
                roleText = `<div style="margin-top: 10px; padding: 5px; background: ${roleData.val().color}; border-radius: 4px;">Role: ${roleData.val().name}</div>`;
            }
        }
        
        Swal.fire({
            title: user.displayName || user.username,
            html: `
                <div style="text-align: center;">
                    <img src="${user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName)}&background=5865f2&color=white&size=100`}" style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px;">
                    <div><strong>Username:</strong> ${escapeHtml(user.username)}</div>
                    ${roleText}
                    ${userId !== currentUser.id ? `<button onclick="startDM('${userId}', '${escapeHtml(user.displayName || user.username)}')" style="margin-top: 15px; padding: 8px 16px; background: #5865f2; border: none; border-radius: 4px; color: white; cursor: pointer;">Send Message</button>` : ''}
                </div>
            `,
            confirmButtonText: 'Close',
            background: '#2b2d31',
            color: 'white'
        });
    }
    
    function showProfileModal() {
        Swal.fire({
            title: 'Edit Profile',
            html: `
                <div style="text-align: center; margin-bottom: 15px;">
                    <img id="avatarPreview" src="${currentUser.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.displayName)}&background=5865f2&color=white&size=100`}" style="width: 100px; height: 100px; border-radius: 50%;">
                    <button class="add-friend-btn" onclick="window.changeAvatar()" style="display: block; margin: 10px auto;">Change Avatar</button>
                </div>
                <input id="displayNameInput" class="auth-input" placeholder="Display Name" value="${escapeHtml(currentUser.displayName)}">
            `,
            showCancelButton: true,
            confirmButtonText: 'Save',
            preConfirm: () => {
                const displayName = document.getElementById('displayNameInput').value.trim();
                if (!displayName) {
                    Swal.showValidationMessage('Display name required');
                    return false;
                }
                return { displayName };
            }
        }).then(async (result) => {
            if (result.value) {
                await usersRef.child(currentUser.id).update({
                    displayName: result.value.displayName
                });
                currentUser.displayName = result.value.displayName;
                Swal.fire('Success', 'Profile updated', 'success');
                renderMainApp();
            }
        });
    }
    
    async function changeAvatar() {
        const { value: file } = await Swal.fire({
            title: 'Select Avatar',
            input: 'file',
            inputAttributes: { 'accept': 'image/*' },
            showCancelButton: true,
            confirmButtonText: 'Upload'
        });
        
        if (file) {
            const avatarUrl = await uploadFile(file);
            await usersRef.child(currentUser.id).update({ avatar: avatarUrl });
            currentUser.avatar = avatarUrl;
            Swal.fire('Success', 'Avatar updated', 'success');
            renderMainApp();
        }
    }
    
    function switchAdminTab(tab) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
        if (tab === 'users') {
            document.querySelector('.admin-tab:first-child').classList.add('active');
            document.getElementById('usersPanel').classList.add('active');
        } else if (tab === 'roles') {
            document.querySelector('.admin-tab:nth-child(2)').classList.add('active');
            document.getElementById('rolesPanel').classList.add('active');
        } else if (tab === 'channels') {
            document.querySelector('.admin-tab:nth-child(3)').classList.add('active');
            document.getElementById('channelsPanel').classList.add('active');
        }
    }
    
    function logout() {
        if (currentMessagesListener) {
            messagesRef.off('child_added', currentMessagesListener);
        }
        currentUser = null;
        localStorage.removeItem('chatUser');
        renderAuthScreen();
    }
    
    function renderMainApp() {
        const avatarUrl = currentUser.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.displayName)}&background=5865f2&color=white&size=32`;
        
        const appDiv = document.getElementById('app');
        appDiv.innerHTML = `
            <div class="app-container">
                <div class="servers-sidebar">
                    <div class="server-item active" onclick="switchToServerView()">
                        <span>🏠</span>
                    </div>
                    <div class="add-server-btn" onclick="createServer()">+</div>
                </div>
                <div class="channels-sidebar">
                    <div class="sidebar-header" id="sidebarHeader">
                        <span id="sidebarTitle">Friends</span>
                        <span>▼</span>
                    </div>
                    <div id="friendsList" class="friends-list"></div>
                    <div id="channelsList" class="channels-list" style="display: none;"></div>
                    <button class="add-friend-btn" onclick="addFriend()">➕ Add Friend</button>
                    ${isAdmin ? '<button class="admin-panel-btn" onclick="showAdminPanel()">⚙️ Admin Panel</button>' : ''}
                </div>
                <div class="main-container">
                    <div class="chat-header">
                        <div class="channel-info">
                            <h2 id="channelName">Welcome</h2>
                            <p id="channelTopic">Select a channel to start chatting <span id="slowmodeIndicator" class="slowmode-indicator" style="display:none;"></span></p>
                        </div>
                        <div class="user-profile">
                            <img src="${avatarUrl}" style="width: 32px; height: 32px; border-radius: 50%;">
                            <button class="profile-btn" onclick="showProfileModal()">${escapeHtml(currentUser.displayName)}</button>
                            <button class="profile-btn" onclick="showPinnedMessages()">📌 Pinned</button>
                            <button class="logout-btn" onclick="logout()">Logout</button>
                        </div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="bottom-panel">
                        <div id="replyBar" class="reply-bar">
                            <span id="replyText"></span>
                            <button class="cancel-reply" onclick="cancelReply()">✖</button>
                        </div>
                        <div class="input-area">
                            <div class="message-input-wrapper">
                                <input type="text" id="messageInput" placeholder="Type a message...">
                                <div class="media-buttons">
                                    <button class="media-btn" onclick="showImageUploadDialog()">📷</button>
                                </div>
                                <button id="sendButton" onclick="sendMessage(document.getElementById('messageInput').value)">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="adminModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Admin Panel</h2>
                        <button class="close-modal" onclick="document.getElementById('adminModal').style.display='none'">×</button>
                    </div>
                    <div class="admin-tabs">
                        <div class="admin-tab active" onclick="switchAdminTab('users')">Users</div>
                        <div class="admin-tab" onclick="switchAdminTab('roles')">Roles</div>
                        <div class="admin-tab" onclick="switchAdminTab('channels')">Channels</div>
                    </div>
                    <div id="usersPanel" class="admin-panel active">
                        <div class="user-list" id="usersList"></div>
                    </div>
                    <div id="rolesPanel" class="admin-panel">
                        <button class="add-friend-btn" onclick="createRole()" style="width: calc(100% - 24px); margin: 12px;">+ Create Role</button>
                        <div class="role-list" id="rolesList"></div>
                    </div>
                    <div id="channelsPanel" class="admin-panel">
                        <div class="channel-list" id="channelsListAdmin"></div>
                    </div>
                </div>
            </div>
        `;
        
        loadFriends();
        loadChannels();
        
        const sidebarHeader = document.getElementById('sidebarHeader');
        let showingFriends = true;
        sidebarHeader.onclick = () => {
            showingFriends = !showingFriends;
            const friendsList = document.getElementById('friendsList');
            const channelsList = document.getElementById('channelsList');
            const title = document.getElementById('sidebarTitle');
            
            if (showingFriends) {
                title.textContent = 'Friends';
                friendsList.style.display = 'block';
                channelsList.style.display = 'none';
            } else {
                title.textContent = 'Servers';
                friendsList.style.display = 'none';
                channelsList.style.display = 'block';
            }
        };
        
        const messageInput = document.getElementById('messageInput');
        if (messageInput) {
            messageInput.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage(messageInput.value);
                }
            };
        }
        
        if (currentChatId && currentChatType === 'server') {
            channelsRef.child(currentChatId).once('value', (snap) => {
                if (snap.exists()) {
                    document.getElementById('channelName').textContent = `# ${snap.val().displayName}`;
                    if (snap.val().slowmode > 0) {
                        document.getElementById('slowmodeIndicator').style.display = 'inline';
                        document.getElementById('slowmodeIndicator').textContent = `Slow Mode: ${snap.val().slowmode}s`;
                    }
                }
            });
        }
    }
    
    function renderAuthScreen() {
        const appDiv = document.getElementById('app');
        appDiv.innerHTML = `
            <div class="auth-overlay">
                <div class="auth-container">
                    <div class="auth-title" id="authTitle">Create Account</div>
                    <input type="text" id="username" class="auth-input" placeholder="Username">
                    <input type="password" id="password" class="auth-input" placeholder="Password">
                    <div id="errorMessage" class="error-message"></div>
                    <button class="auth-button" id="submitButton">Register</button>
                    <div class="auth-switch" id="authSwitch">Already have an account? Login</div>
                </div>
            </div>
        `;
        
        let isLoginMode = false;
        document.getElementById('submitButton').onclick = () => submitAuth(isLoginMode);
        document.getElementById('authSwitch').onclick = () => {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('authTitle');
            const submitBtn = document.getElementById('submitButton');
            if (isLoginMode) {
                title.textContent = 'Login';
                submitBtn.textContent = 'Login';
            } else {
                title.textContent = 'Create Account';
                submitBtn.textContent = 'Register';
            }
        };
    }
    
    async function submitAuth(isLoginMode) {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorElement = document.getElementById('errorMessage');
        const submitButton = document.getElementById('submitButton');
        
        if (!username || !password) {
            errorElement.textContent = 'Fill all fields';
            return;
        }
        
        submitButton.disabled = true;
        submitButton.textContent = 'Processing...';
        
        try {
            if (isLoginMode) {
                const userSnapshot = await usersRef.orderByChild('username').equalTo(username).once('value');
                if (!userSnapshot.exists()) {
                    errorElement.textContent = 'User not found';
                    return;
                }
                
                let userFound = false;
                userSnapshot.forEach(childSnapshot => {
                    const data = childSnapshot.val();
                    if (data.password === password) {
                        userFound = true;
                        currentUser = {
                            id: childSnapshot.key,
                            username: data.username,
                            displayName: data.displayName || data.username,
                            avatar: data.avatar
                        };
                    }
                });
                
                if (userFound) {
                    const isBanned = await bansRef.child(currentUser.id).once('value');
                    if (isBanned.exists()) {
                        const banData = isBanned.val();
                        if (!banData.expiresAt || banData.expiresAt > Date.now()) {
                            errorElement.textContent = 'You are banned';
                            return;
                        } else {
                            await bansRef.child(currentUser.id).remove();
                        }
                    }
                    localStorage.setItem('chatUser', JSON.stringify(currentUser));
                    isAdmin = currentUser.username === ADMIN_USERNAME;
                    renderMainApp();
                } else {
                    errorElement.textContent = 'Invalid password';
                }
            } else {
                const existingUser = await usersRef.orderByChild('username').equalTo(username).once('value');
                if (existingUser.exists()) {
                    errorElement.textContent = 'Username taken';
                    return;
                }
                
                const newUserRef = usersRef.push();
                await newUserRef.set({
                    username,
                    password,
                    displayName: username,
                    avatar: null,
                    createdAt: Date.now()
                });
                
                currentUser = {
                    id: newUserRef.key,
                    username,
                    displayName: username,
                    avatar: null
                };
                localStorage.setItem('chatUser', JSON.stringify(currentUser));
                isAdmin = currentUser.username === ADMIN_USERNAME;
                renderMainApp();
            }
        } catch (error) {
            errorElement.textContent = 'Error: ' + error.message;
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = isLoginMode ? 'Login' : 'Register';
        }
    }
    
    // Глобальные функции
    window.addFriend = addFriend;
    window.startDM = startDM;
    window.showUserProfile = showUserProfile;
    window.showProfileModal = showProfileModal;
    window.changeAvatar = changeAvatar;
    window.sendMessage = sendMessage;
    window.showImageUploadDialog = showImageUploadDialog;
    window.togglePinMessage = togglePinMessage;
    window.showPinnedMessages = showPinnedMessages;
    window.deleteMessage = deleteMessage;
    window.setReplyTo = setReplyTo;
    window.cancelReply = cancelReply;
    window.createServer = createServer;
    window.switchToServerView = switchToServerView;
    window.showAdminPanel = showAdminPanel;
    window.banUser = banUser;
    window.muteUser = muteUser;
    window.assignRole = assignRole;
    window.createRole = createRole;
    window.editRole = editRole;
    window.deleteRole = deleteRole;
    window.configureChannel = configureChannel;
    window.editChannel = editChannel;
    window.deleteChannel = deleteChannel;
    window.switchAdminTab = switchAdminTab;
    window.scrollToMessage = (messageId) => {
        const element = document.querySelector(`.message[data-key="${messageId}"]`);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            element.style.background = '#2b2d31';
            setTimeout(() => {
                element.style.background = '';
            }, 2000);
        }
    };
    
    // Инициализация
    async function init() {
        const savedUser = localStorage.getItem('chatUser');
        if (savedUser) {
            try {
                const userData = JSON.parse(savedUser);
                const userCheck = await usersRef.child(userData.id).once('value');
                if (userCheck.exists()) {
                    const userVal = userCheck.val();
                    currentUser = {
                        id: userData.id,
                        username: userVal.username,
                        displayName: userVal.displayName || userVal.username,
                        avatar: userVal.avatar
                    };
                    isAdmin = currentUser.username === ADMIN_USERNAME;
                    renderMainApp();
                    return;
                }
            } catch (error) {
                console.error(error);
            }
        }
        renderAuthScreen();
    }
    
    init();
</script>
</body>
</html>
